# AWS SAM deploy configuration
# https://docs.aws.amazon.com/serverless-application-model/latest/developerguide/serverless-sam-cli-config.html

version = 0.1

# --- asken-garmin-sync ---------------------------------------------------
[default.global.parameters]
stack_name = "asken-garmin-sync"
region = "ap-northeast-1"

[default.build.parameters]
cached        = true
parallel      = true
template_file = "template-garmin.yaml"
# use_container = true is required on Windows/macOS to build compiled packages
# (e.g. lxml) for the Lambda runtime (Amazon Linux 2023).
# Requires Docker to be running: docker run --rm hello-world
use_container = true

[default.deploy.parameters]
capabilities       = "CAPABILITY_IAM"
confirm_changeset  = true
resolve_s3         = true
# Set region and profile for your environment:
# region  = "ap-northeast-1"
# profile = "default"
s3_prefix = "asken-garmin-sync"
profile = "default"
parameter_overrides = "SecretName=\"asken-garmin-sync\""
image_repositories = []

[default.sync.parameters]
watch = true

# --- asken-myfitnesspal-sync ---------------------------------------------
# Usage:
#   sam build --config-env mfp
#   sam deploy --config-env mfp
[mfp.global.parameters]
stack_name = "asken-myfitnesspal-sync"
region     = "ap-northeast-1"

[mfp.build.parameters]
cached        = true
parallel      = true
use_container = true
template_file = "template-mfp.yaml"

[mfp.deploy.parameters]
stack_name          = "asken-myfitnesspal-sync"
capabilities        = "CAPABILITY_IAM"
confirm_changeset   = true
resolve_s3          = true
s3_prefix           = "asken-myfitnesspal-sync"
profile             = "default"
parameter_overrides = "SecretName=\"asken-myfitnesspal-sync\""
image_repositories  = []
