AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  asken-myfitnesspal-sync
  Sync meal data from Asken to MyFitnessPal via Lambda

# --- Global settings ---
Globals:
  Function:
    Runtime: python3.12
    # Timeout based on worst-case estimates:
    #   Asken login: GET 30s + POST 30s = 60s
    #   MFP login: 30s
    #   Fetch/register per meal category (4 categories x max 3 retries): 93s x 4 = 372s
    #   In practice, 300s is sufficient for the main bottlenecks.
    Timeout: 300
    MemorySize: 256      # Accounts for memory usage of requests + BeautifulSoup + lxml
    Environment:
      Variables:
        SECRET_NAME: !Ref SecretName

# --- Parameters ---
Parameters:
  SecretName:
    Type: String
    Default: asken-myfitnesspal-sync
    # Restrict to alphanumeric and symbols since this is embedded directly in IAM resource ARNs
    AllowedPattern: '^[a-zA-Z0-9/_+=.@-]+$'
    ConstraintDescription: >
      Only alphanumeric characters and /_+=.@- are allowed (no spaces or special characters).
    Description: >
      AWS Secrets Manager secret name.
      The secret must be a JSON object containing the keys:
      asken_email / asken_password / myfitnesspal_email / myfitnesspal_password

# --- Resources ---
Resources:

  # EventBridge Scheduler schedule group
  # Explicitly created so that EarlyValidation::ResourceExistenceCheck can verify
  # the group exists before the schedules are created. Without this, the check
  # on the implicit "default" group can fail during new-stack creation.
  SyncScheduleGroup:
    Type: AWS::Scheduler::ScheduleGroup
    Properties:
      Name: asken-myfitnesspal-sync

  # CloudWatch log group (retention: 30 days)
  # Defined before SyncFunction and referenced via DependsOn to ensure the log group
  # with 30-day retention exists before Lambda auto-creates one.
  # WARNING: LogGroupName must always match SyncFunction.Properties.FunctionName.
  #          Update both locations together when either is changed.
  SyncFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/asken-myfitnesspal-sync
      RetentionInDays: 30

  # Lambda function
  SyncFunction:
    Type: AWS::Serverless::Function
    # DependsOn ensures the log group with 30-day retention is created
    # before Lambda auto-creates its own log group.
    DependsOn: SyncFunctionLogGroup
    Metadata:
      BuildProperties:
        # Use the MFP-specific requirements file (excludes garminconnect).
        # WARNING: RequirementsFile requires SAM CLI >= 1.111.0.
        RequirementsFile: requirements_mfp.txt
    Properties:
      FunctionName: asken-myfitnesspal-sync
      # CodeUri set to src/ for src/ layout.
      # SAM installs dependencies from src/requirements_mfp.txt and places
      # src/asken_myfitnesspal_sync/ at /var/task/asken_myfitnesspal_sync/.
      CodeUri: src/
      Handler: asken_myfitnesspal_sync.handler.lambda_handler
      Description: Sync meal data from Asken to MyFitnessPal

      # Limit concurrency to 1 to prevent duplicate executions
      ReservedConcurrentExecutions: 1

      Policies:
        # Basic Lambda execution role (write to CloudWatch Logs)
        - AWSLambdaBasicExecutionRole
        # Secrets Manager access (read-only)
        - Statement:
            - Sid: SecretsManagerReadOnly
              Effect: Allow
              Action:
                - secretsmanager:GetSecretValue    # Read credentials
              # Secrets Manager appends a 6-character random suffix to ARNs
              Resource: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${SecretName}-*'

      Events:
        # Run at minute 0 of every hour (JST/UTC: every hour at :00)
        HourlySchedule:
          Type: ScheduleV2
          Properties:
            Name: asken-myfitnesspal-sync-hourly
            ScheduleExpression: 'cron(0 * * * ? *)'
            State: ENABLED
            Description: Asken to MyFitnessPal hourly sync
            GroupName: !Ref SyncScheduleGroup
            FlexibleTimeWindow:
              Mode: 'OFF'
            # Disable scheduler-level retries.
            # On Lambda failure, wait for the next scheduled execution.
            # MaximumEventAgeInSeconds minimum is 60 per spec.
            RetryPolicy:
              MaximumRetryAttempts: 0
              MaximumEventAgeInSeconds: 60

        # Run daily at 23:59 JST (= 14:59 UTC)
        DailySchedule:
          Type: ScheduleV2
          Properties:
            Name: asken-myfitnesspal-sync-daily
            ScheduleExpression: 'cron(59 14 * * ? *)'
            ScheduleExpressionTimezone: Asia/Tokyo
            State: ENABLED
            Description: Asken to MyFitnessPal daily sync at 23:59 JST
            GroupName: !Ref SyncScheduleGroup
            FlexibleTimeWindow:
              Mode: 'OFF'
            RetryPolicy:
              MaximumRetryAttempts: 0
              MaximumEventAgeInSeconds: 60

# --- Outputs ---
Outputs:
  SyncFunctionArn:
    Description: ARN of the sync Lambda function
    Value: !GetAtt SyncFunction.Arn

  SyncFunctionName:
    Description: Name of the sync Lambda function
    Value: !Ref SyncFunction

  LogGroupName:
    Description: CloudWatch log group name
    Value: !Ref SyncFunctionLogGroup
