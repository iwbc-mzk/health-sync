AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  asken-myfitnesspal-sync
  あすけん → MyFitnessPal 食事データ同期 Lambda

# ─── グローバル設定 ──────────────────────────────────────────────────────────
Globals:
  Function:
    Runtime: python3.12
    # Timeout の根拠（現実的な最悪ケース想定）:
    #   あすけんログイン: GET 30s + POST 30s = 60s
    #   MFP ログイン: 30s
    #   食事区分ごとの取得・登録（4区分 × 最大3回リトライ）: 93s × 4 = 372s
    #   実用上の主要ボトルネックは少数操作のため 300s で十分。
    Timeout: 300
    MemorySize: 256      # requests + BeautifulSoup + lxml のメモリ使用量を考慮
    Environment:
      Variables:
        SECRET_NAME: !Ref SecretName

# ─── パラメータ ──────────────────────────────────────────────────────────────
Parameters:
  SecretName:
    Type: String
    Default: asken-myfitnesspal-sync
    # IAM リソース ARN に直接埋め込まれるため、使用可能文字を英数字・記号に制限する
    AllowedPattern: '^[a-zA-Z0-9/_+=.@-]+$'
    ConstraintDescription: >
      英数字および /_+=.@- のみ使用可能です（スペース・特殊文字不可）。
    Description: >
      AWS Secrets Manager のシークレット名。
      asken_email / asken_password / myfitnesspal_email / myfitnesspal_password
      キーを含む JSON シークレットを事前に作成すること。

# ─── リソース ────────────────────────────────────────────────────────────────
Resources:

  # CloudWatch ロググループ（保持期間 30 日）
  # SyncFunction より先に定義し、DependsOn で先行作成を保証することで
  # Lambda 側のロググループ自動作成より先に保持期間 30 日設定済みのロググループが
  # 存在する状態にする。
  # ⚠️ LogGroupName は SyncFunction.Properties.FunctionName と必ず一致させること。
  #   どちらかを変更した場合はもう一方も必ず更新する（2箇所の値を同期させる）。
  SyncFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/asken-myfitnesspal-sync
      RetentionInDays: 30

  # Lambda 関数
  SyncFunction:
    Type: AWS::Serverless::Function
    # SyncFunctionLogGroup を先に作成することで Lambda のロググループ自動作成より
    # 先に保持期間 30 日設定済みのロググループが存在する状態にする。
    DependsOn: SyncFunctionLogGroup
    Metadata:
      BuildProperties:
        # garminconnect を含まない MFP 専用の requirements ファイルを使用する。
        # ⚠️ RequirementsFile は SAM CLI >= 1.111.0 が必要。
        RequirementsFile: requirements_mfp.txt
    Properties:
      FunctionName: asken-myfitnesspal-sync
      # src/ レイアウトのため CodeUri を src に設定する。
      # SAM は src/requirements_mfp.txt を参照して依存パッケージをインストールし、
      # src/asken_myfitnesspal_sync/ を /var/task/asken_myfitnesspal_sync/ として配置する。
      CodeUri: src/
      Handler: asken_myfitnesspal_sync.handler.lambda_handler
      Description: あすけん → MyFitnessPal 食事データ同期

      # 同時実行数を 1 に制限（重複実行防止）
      ReservedConcurrentExecutions: 1

      Policies:
        # Lambda 基本実行ロール（CloudWatch Logs への書き込み）
        - AWSLambdaBasicExecutionRole
        # Secrets Manager アクセス（認証情報の読み取りのみ）
        - Statement:
            - Sid: SecretsManagerReadOnly
              Effect: Allow
              Action:
                - secretsmanager:GetSecretValue    # 認証情報の読み取り
              # Secrets Manager は ARN 末尾に 6 文字のランダムサフィックスを付与する
              Resource: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${SecretName}-*'

      Events:
        # 毎時 0 分に実行（JST・UTC 共通: 毎時 0 分）
        HourlySchedule:
          Type: ScheduleV2
          Properties:
            Name: asken-myfitnesspal-sync-hourly
            ScheduleExpression: 'cron(0 * * * ? *)'
            State: ENABLED
            Description: あすけん → MyFitnessPal 毎時同期
            FlexibleTimeWindow:
              Mode: 'OFF'
            # Scheduler レベルのリトライを無効化。
            # Lambda 実行失敗時は次のスケジュールを待つ。
            # MaximumEventAgeInSeconds は仕様上 60 以上が必須のため最小値を設定。
            RetryPolicy:
              MaximumRetryAttempts: 0
              MaximumEventAgeInSeconds: 60

        # 毎日 23:59 JST（= 14:59 UTC）に実行
        DailySchedule:
          Type: ScheduleV2
          Properties:
            Name: asken-myfitnesspal-sync-daily
            ScheduleExpression: 'cron(59 14 * * ? *)'
            State: ENABLED
            Description: あすけん → MyFitnessPal 毎日 23:59 JST 同期
            FlexibleTimeWindow:
              Mode: 'OFF'
            RetryPolicy:
              MaximumRetryAttempts: 0
              MaximumEventAgeInSeconds: 60

# ─── 出力 ────────────────────────────────────────────────────────────────────
Outputs:
  SyncFunctionArn:
    Description: 同期 Lambda 関数の ARN
    Value: !GetAtt SyncFunction.Arn

  SyncFunctionName:
    Description: 同期 Lambda 関数名
    Value: !Ref SyncFunction

  LogGroupName:
    Description: CloudWatch ロググループ名
    Value: !Ref SyncFunctionLogGroup
